<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Page</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* imagem central no tamanho original */
        .center-img {
            position: absolute;
            max-width: none;
            width: auto;
            height: auto;
            z-index: 1;
        }

        /* vídeo passando pela tela */
        .cat-video {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            height: auto;
            width: 180px;
            z-index: 2;
            animation: moveCat 6s linear infinite;
            pointer-events: none;
        }

        @keyframes moveCat {
            0% {
                left: -220px;
            }
            100% {
                left: 110%;
            }
        }
    </style>
</head>
<body>

    <!-- imagem central -->
    <img src="clash.png" class="center-img" alt="Clash">

    <!-- vídeo atravessando a tela -->
    <video class="cat-video" src="cat.mp4" autoplay loop muted></video>

</body>
</html>
